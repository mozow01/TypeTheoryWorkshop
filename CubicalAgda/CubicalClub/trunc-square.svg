  <circle cx="82" cy="220" r="5.5" fill="#111827" />
  <circle cx="254" cy="220" r="5.5" fill="#111827" />

  <text x="168" y="95" font-family="sans-serif" font-size="22" font-style="italic" font-weight="700" text-anchor="middle" fill="#3b82f6">p</text>
  <text x="168" y="247" font-family="sans-serif" font-size="22" font-style="italic" font-weight="700" text-anchor="middle" fill="#10b981">q</text>
  <text x="58" y="102" font-family="sans-serif" font-size="19" font-style="italic" font-weight="700" text-anchor="end" fill="#111827">x</text>
  <text x="278" y="102" font-family="sans-serif" font-size="19" font-style="italic" font-weight="700" fill="#111827">y</text>
  <text x="58" y="226" font-family="sans-serif" font-size="19" font-style="italic" font-weight="700" text-anchor="end" fill="#111827">x</text>
  <text x="278" y="226" font-family="sans-serif" font-size="19" font-style="italic" font-weight="700" fill="#111827">y</text>
  <text x="168" y="286" font-family="sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#374151">I × I</text>
  <text x="286" y="164" font-family="sans-serif" font-size="18" font-style="italic" fill="#6b7280">i</text>
  <text x="168" y="66" font-family="sans-serif" font-size="18" font-style="italic" fill="#6b7280">j</text>

