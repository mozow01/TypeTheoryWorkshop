  <text x="660" y="282" font-family="sans-serif" font-size="23" font-style="italic" font-weight="700" text-anchor="middle" fill="#10b981">q</text>
  <text x="660" y="184" font-family="sans-serif" font-size="25" font-style="italic" font-weight="700" text-anchor="middle" fill="#4f46e5">p ≡ q</text>

  <rect x="535" y="306" width="250" height="34" rx="8" fill="#ffffff" opacity="0.86" stroke="#e5e7eb" />
  <text x="660" y="329" font-family="monospace" font-size="17" text-anchor="middle" fill="#111827">
