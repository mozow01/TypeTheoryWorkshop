  <rect x="312" y="124" width="128" height="34" rx="8" fill="#ffffff" stroke="#e5e7eb" />
  <text x="376" y="147" font-family="monospace" font-size="16" text-anchor="middle" fill="#111827">trunc x y p q</text>

