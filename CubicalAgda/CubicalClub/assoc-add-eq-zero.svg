<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1020" height="650" viewBox="0 0 1020 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#4f46e5" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#059669" />
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#6b7280" />
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="1020" height="650" fill="#ffffff" />

  <rect x="58" y="34" width="904" height="86" rx="12" fill="#f8fafc" stroke="#e5e7eb" />
  <text x="510" y="66" font-size="22" font-weight="700" text-anchor="middle" fill="#111827">
    Az eq-add-zero x út mentén a bizonyítások típusa is mozog
  </text>
  <text x="510" y="98" class="mono" font-size="18" text-anchor="middle" fill="#374151">
    r i = eq-add-zero x i      B i = L i ≡ R i
  </text>

  <!-- Base path r i -->
  <path d="M 158 164 C 310 119, 710 119, 862 164" fill="none" stroke="#10b981" stroke-width="4" />
  <circle cx="158" cy="164" r="7" fill="#047857" />
  <circle cx="862" cy="164" r="7" fill="#047857" />
  <text x="158" y="144" class="mono" font-size="17" font-weight="700" text-anchor="middle" fill="#065f46">r i0</text>
  <text x="158" y="190" class="mono" font-size="16" text-anchor="middle" fill="#065f46">add zero x</text>
  <text x="862" y="144" class="mono" font-size="17" font-weight="700" text-anchor="middle" fill="#065f46">r i1</text>
  <text x="862" y="190" class="mono" font-size="16" text-anchor="middle" fill="#065f46">x</text>
  <text x="510" y="145" class="mono" font-size="18" font-weight="700" text-anchor="middle" fill="#059669">r i</text>
  <text x="510" y="186" font-size="15" text-anchor="middle" fill="#64748b">
    ez a HIT path konstruktor által adott alapút
  </text>

  <!-- Moving equality square -->
  <path d="M 113 246 C 230 207, 790 207, 907 246 C 950 316, 950 422, 907 492 C 790 531, 230 531, 113 492 C 70 422, 70 316, 113 246 Z"
        fill="#eef2ff" stroke="#c7d2fe" stroke-width="2" stroke-dasharray="8 5" />
  <text x="510" y="237" font-size="18" font-weight="700" text-anchor="middle" fill="#4338ca">
    PathP B p0 p1: egy függő út a bizonyítások között
  </text>

  <!-- Node boxes -->
  <rect x="70" y="265" width="362" height="64" rx="9" fill="#ffffff" stroke="#dbeafe" stroke-width="2" filter="url(#softShadow)" />
  <rect x="588" y="265" width="362" height="64" rx="9" fill="#ffffff" stroke="#dbeafe" stroke-width="2" filter="url(#softShadow)" />
  <rect x="70" y="365" width="362" height="64" rx="9" fill="#ffffff" stroke="#ddd6fe" stroke-width="2" filter="url(#softShadow)" />
  <rect x="588" y="365" width="362" height="64" rx="9" fill="#ffffff" stroke="#ddd6fe" stroke-width="2" filter="url(#softShadow)" />
  <rect x="70" y="465" width="362" height="64" rx="9" fill="#ffffff" stroke="#dbeafe" stroke-width="2" filter="url(#softShadow)" />
  <rect x="588" y="465" width="362" height="64" rx="9" fill="#ffffff" stroke="#dbeafe" stroke-width="2" filter="url(#softShadow)" />

  <!-- Horizontal proof paths -->
  <path d="M 442 297 L 578 297" fill="none" stroke="#4f46e5" stroke-width="3.5" marker-end="url(#arrowBlue)" />
  <path d="M 442 397 L 578 397" fill="none" stroke="#7c3aed" stroke-width="3.5" stroke-dasharray="7 5" marker-end="url(#arrowBlue)" />
  <path d="M 442 497 L 578 497" fill="none" stroke="#4f46e5" stroke-width="3.5" marker-end="url(#arrowBlue)" />

  <!-- Vertical motion induced by r i under the two contexts -->
  <path d="M 251 335 L 251 358" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)" />
  <path d="M 251 435 L 251 458" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)" />
  <path d="M 769 335 L 769 358" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)" />
  <path d="M 769 435 L 769 458" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)" />

  <!-- Labels in boxes -->
  <text x="251" y="287" class="mono" font-size="15" font-weight="700" text-anchor="middle" fill="#1e40af">L i0</text>
  <text x="251" y="312" class="mono" font-size="15" text-anchor="middle" fill="#111827">add (add (add zero x) y) z</text>

  <text x="769" y="287" class="mono" font-size="15" font-weight="700" text-anchor="middle" fill="#1e40af">R i0</text>
  <text x="769" y="312" class="mono" font-size="15" text-anchor="middle" fill="#111827">add (add zero x) (add y z)</text>

  <text x="251" y="387" class="mono" font-size="15" font-weight="700" text-anchor="middle" fill="#5b21b6">L i</text>
  <text x="251" y="412" class="mono" font-size="15" text-anchor="middle" fill="#111827">add (add (r i) y) z</text>

  <text x="769" y="387" class="mono" font-size="15" font-weight="700" text-anchor="middle" fill="#5b21b6">R i</text>
  <text x="769" y="412" class="mono" font-size="15" text-anchor="middle" fill="#111827">add (r i) (add y z)</text>

  <text x="251" y="487" class="mono" font-size="15" font-weight="700" text-anchor="middle" fill="#1e40af">L i1</text>
  <text x="251" y="512" class="mono" font-size="15" text-anchor="middle" fill="#111827">add (add x y) z</text>

  <text x="769" y="487" class="mono" font-size="15" font-weight="700" text-anchor="middle" fill="#1e40af">R i1</text>
  <text x="769" y="512" class="mono" font-size="15" text-anchor="middle" fill="#111827">add x (add y z)</text>

  <text x="510" y="283" class="mono" font-size="16" font-weight="700" text-anchor="middle" fill="#4338ca">p0</text>
  <text x="510" y="384" class="mono" font-size="16" font-weight="700" text-anchor="middle" fill="#6d28d9">b i</text>
  <text x="510" y="483" class="mono" font-size="16" font-weight="700" text-anchor="middle" fill="#4338ca">p1</text>

  <text x="101" y="356" class="mono" font-size="14" text-anchor="start" fill="#047857">L i = add (add (r i) y) z</text>
  <text x="619" y="356" class="mono" font-size="14" text-anchor="start" fill="#047857">R i = add (r i) (add y z)</text>

  <!-- Transport mechanism -->
  <rect x="74" y="566" width="872" height="54" rx="10" fill="#f8fafc" stroke="#e5e7eb" />
  <text x="103" y="588" class="mono" font-size="15" fill="#111827">p0 : B i0</text>
  <path d="M 205 584 L 343 584" fill="none" stroke="#6b7280" stroke-width="2.4" marker-end="url(#arrowGray)" />
  <text x="274" y="575" font-size="13" text-anchor="middle" fill="#6b7280">transport B</text>
  <text x="371" y="588" class="mono" font-size="15" fill="#111827">transport B p0 : B i1</text>
  <path d="M 581 584 L 708 584" fill="none" stroke="#6b7280" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#arrowGray)" />
  <text x="645" y="575" font-size="13" text-anchor="middle" fill="#6b7280">isProp (B i1)</text>
  <text x="736" y="588" class="mono" font-size="15" fill="#111827">p1 : B i1</text>
  <text x="510" y="611" class="mono" font-size="14" text-anchor="middle" fill="#374151">
    isProp→PathP hB p0 p1 = toPathP (hB i1 (transport B p0) p1)
  </text>
</svg>
