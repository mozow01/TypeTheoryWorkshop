<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="760" height="360" viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#374151" />
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Ambient type/family space -->
  <path d="M 62 62 C 185 5, 565 5, 698 62 C 754 126, 750 252, 688 302 C 535 356, 210 352, 70 300 C 10 246, 11 126, 62 62 Z"
        fill="#f3f4f6" stroke="#d1d5db" stroke-width="2" stroke-dasharray="9 5" />
  <text x="62" y="58" font-family="sans-serif" font-size="22" font-style="italic" font-weight="700" fill="#6b7280">Σ P</text>

  <!-- Base path -->
  <path d="M 150 276 C 285 320, 475 320, 610 276" fill="none" stroke="#10b981" stroke-width="3" />
  <circle cx="150" cy="276" r="6" fill="#111827" />
  <circle cx="610" cy="276" r="6" fill="#111827" />
  <text x="118" y="303" font-family="sans-serif" font-size="20" font-style="italic" font-weight="700" fill="#111827">left</text>
  <text x="623" y="303" font-family="sans-serif" font-size="20" font-style="italic" font-weight="700" fill="#111827">right</text>
  <text x="380" y="328" font-family="sans-serif" font-size="20" font-style="italic" font-weight="700" text-anchor="middle" fill="#10b981">path i</text>

  <!-- Propositional family strip over the base path -->
  <path d="M 150 145 C 270 58, 490 58, 610 145 C 490 216, 270 216, 150 145 Z"
        fill="#e0e7ff" opacity="0.92" stroke="#818cf8" stroke-width="2" filter="url(#softShadow)" />
  <path d="M 205 126 C 305 90, 455 90, 555 126" fill="none" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="5 4" />
  <path d="M 205 166 C 305 197, 455 197, 555 166" fill="none" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="5 4" />
  <path d="M 270 92 C 252 132, 252 158, 270 198" fill="none" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="5 4" />
  <path d="M 490 92 C 508 132, 508 158, 490 198" fill="none" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="5 4" />

  <!-- Dependent path between endpoint proofs -->
  <path d="M 168 145 C 290 100, 470 100, 592 145" fill="none" stroke="#4f46e5" stroke-width="4" />
  <circle cx="168" cy="145" r="7" fill="#4f46e5" />
  <circle cx="592" cy="145" r="7" fill="#4f46e5" />

  <!-- Projections -->
  <path d="M 168 152 C 168 192, 154 230, 150 270" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 5" />
  <path d="M 592 152 C 592 192, 606 230, 610 270" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 5" />

  <!-- Labels -->
  <text x="168" y="125" font-family="sans-serif" font-size="20" font-style="italic" font-weight="700" text-anchor="middle" fill="#4f46e5">α : P left</text>
  <text x="592" y="125" font-family="sans-serif" font-size="20" font-style="italic" font-weight="700" text-anchor="middle" fill="#4f46e5">β : P right</text>
  <text x="380" y="82" font-family="sans-serif" font-size="21" font-style="italic" font-weight="700" text-anchor="middle" fill="#4338ca">P (path i) isProp</text>
  <text x="380" y="153" font-family="sans-serif" font-size="24" font-style="italic" font-weight="700" text-anchor="middle" fill="#312e81">isProp→PathP</text>

  <!-- Formula strip -->
  <rect x="168" y="24" width="424" height="34" rx="8" fill="#ffffff" opacity="0.86" stroke="#e5e7eb" />
  <text x="380" y="47" font-family="monospace" font-size="18" text-anchor="middle" fill="#111827">
    PathP (λ i → P (path i)) α β
  </text>
</svg>
